services:
  app:
    build: .
    container_name: wallet-app
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:${DB_PORT}/${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - MOCK_URL=${MOCK_URL}
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
      wiremock:
        condition: service_started
    networks:
      - wallet-net

  db:
    image: postgres:16-alpine
    container_name: wallet-db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wallet-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: wallet-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - wallet-net

  wiremock:
    image: wiremock/wiremock:latest
    container_name: wallet-wiremock
    ports:
      - "8081:8080"
    command: "--verbose --global-response-templating"
    volumes:
      - ./mocks:/home/wiremock
    networks:
      - wallet-net

volumes:
  postgres_data:

networks:
  wallet-net:
    driver: bridge